apiVersion: plugin.gibson.zero-day.ai/v1
kind: Plugin
metadata:
  name: byte-identity-multi
  version: 0.99.0
  description: "byte-identity-multi plugin"
  author: ""
spec:
  workload_class: plugin
  runtime: process
  secrets:
  - name: cred:db_password
    scope: startup
    rotation: live
    required: true
  - name: cred:token
    scope: per_call
    rotation: restart
    required: true
  methods:
  - name: Echo
    description: "Echo returns the request message unchanged."
    request_proto: "gibson.plugins.byte-identity-multi.v1.EchoRequest"
    response_proto: "gibson.plugins.byte-identity-multi.v1.EchoResponse"
  health:
    startup_timeout: 30s
    liveness_interval: 10s
