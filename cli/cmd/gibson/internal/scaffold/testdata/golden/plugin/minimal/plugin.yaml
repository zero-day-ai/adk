apiVersion: plugin.gibson.zero-day.ai/v1
kind: Plugin
metadata:
  name: byte-identity
  version: 0.1.0
  description: "byte-identity plugin"
  author: ""
spec:
  workload_class: plugin
  runtime: process
  methods:
  - name: Echo
    description: "Echo returns the request message unchanged."
    request_proto: "gibson.plugins.byte-identity.v1.EchoRequest"
    response_proto: "gibson.plugins.byte-identity.v1.EchoResponse"
  health:
    startup_timeout: 30s
    liveness_interval: 10s
