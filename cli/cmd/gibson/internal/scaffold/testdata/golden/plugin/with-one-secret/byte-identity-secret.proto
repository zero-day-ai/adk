syntax = "proto3";

package gibson.plugins.byte-identity-secret.v1;

option go_package = "github.com/byte-identity-secret/gen/gibson/plugins/byte-identity-secret/v1;byte-identity-secretv1";

// EchoRequest is the request message for the Echo method.
message EchoRequest {
  // message is the text to echo back.
  string message = 1;
}

// EchoResponse is the response message for the Echo method.
message EchoResponse {
  // reply echoes the request message back unchanged.
  string reply = 1;
}
