# Shared golangci-lint v2 baseline — adopted from
# zero-day-ai/.github/templates/golangci-base.yml (slice 2.2, gibson#172).
# Linter set lives in the base; per-repo section below is the only place
# to add repo-specific exclusions.
#
# Note: the Go module lives under cli/. Run golangci-lint from cli/.

version: "2"

linters:
  default: none
  enable:
    - staticcheck
    - govet
    - errcheck
    - ineffassign
    - unused
    - exhaustive
    - gosec
    - errorlint
    - wrapcheck
    - nilerr
    - contextcheck
    - fatcontext
    # depguard disabled — requires explicit rules config to avoid blocking
    # all third-party imports; see zero-day-ai/.github#93 for the org-level fix.
    - gocritic
    - revive
    - gocyclo
    - prealloc
    - dupl
    - copyloopvar
    - gocheckcompilerdirectives
    - intrange
    - mirror
    - perfsprint
    - sloglint
    - testifylint
    - thelper
    - usestdlibvars
    - whitespace

  settings:
    staticcheck:
      checks: ["all"]
    gosec:
      severity: medium
    exhaustive:
      default-signifies-exhaustive: false
      check: [switch]
    gocyclo:
      min-complexity: 20
    dupl:
      threshold: 150
    gocritic:
      enabled-tags: [diagnostic, performance, style]
      disabled-checks: [hugeParam, rangeValCopy]

  exclusions:
    paths:
      - ".*\\.pb\\.go$"
      - ".*_grpc\\.pb\\.go$"
      - "zz_generated.*\\.go$"
      - "api/gen/.*"
    rules: []

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

